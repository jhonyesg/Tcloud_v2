server {
    listen 80;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # CORS headers for media preview
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Share-Password, X-Requested-With" always;

    # Plugin files: no-cache so changes take effect immediately
    location ^~ /plugins/ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        try_files $uri =404;
    }

    # Static assets (not plugins): long cache
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
        try_files $uri =404;
    }

    # Laravel public directory
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 3600;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 256 16k;
        fastcgi_busy_buffers_size 256k;
    }

    # X-Accel-Redirect: PHP sets this header, nginx serves the file directly from disk
    # alias / gives access to any absolute path inside the container (internal = not externally accessible)
    location /x-accel/ {
        internal;
        alias /;
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        add_header Accept-Ranges bytes always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Access-Control-Allow-Origin "*" always;
    }

    # Protected files - served via X-Accel-Redirect (no PHP involved)
    location /protected-files/ {
        internal;
        alias /var/www/html/storage/app/;
        add_header Cache-Control "public, max-age=31536000";
        add_header Access-Control-Allow-Origin "*";
    }

    # Video streaming with range request support
    location ~* \.(mp4|webm|mov)$ {
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        max_ranges 100;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # Audio streaming
    location ~* \.(mp3|mp4a|ogg|wav)$ {
        add_header Accept-Ranges bytes;
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    # PDF and image preview
    location ~* \.(pdf|jpeg|jpg|png|gif|webp)$ {
        add_header Cache-Control "public, max-age=3600";
        add_header Access-Control-Allow-Origin "*";
        add_header Content-Disposition "inline";
        try_files $uri =404;
    }

    # Large file upload
    client_max_body_size 10G;

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}