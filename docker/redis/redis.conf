# Redis configuration for TCloud

# Network
bind 0.0.0.0
port 6379

# Persistence
save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Logging
loglevel notice

# Append only file for durability
appendonly yes
appendfilename "appendonly.aof"

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128