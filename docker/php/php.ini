; PHP Configuration for TCloud

; Memory and execution
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; Upload settings
upload_max_filesize = 10G
post_max_size = 10G

; OPCache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.save_comments = 1

; Error display (disable in production)
display_errors = Off
display_startup_errors = Off

; Timezone
date.timezone = America/Mexico_City

; Sessions
session.save_handler = redis
session.save_path = "tcp://redis:6379?prefix=tcloud_session:"

; Logging
error_log = /var/www/html/storage/logs/php_errors.log

; Temp directory for file operations
sys_temp_dir = /var/www/html/storage
upload_tmp_dir = /var/www/html/storage